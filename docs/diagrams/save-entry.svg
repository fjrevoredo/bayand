<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="640" viewBox="0 0 1000 640" role="img" aria-labelledby="title desc">
  <title id="title">Bayand save record flow</title>
  <desc id="desc">Selected date loads records, RecordPanel edits health data, records are created or saved, payload JSON is encrypted, and calendar dates refresh.</desc>
  <rect width="1000" height="640" fill="#ffffff"/>
  <style>
    text { font-family: "IBM Plex Sans", sans-serif; fill: #111827; font-size: 18px; }
    .small { font-size: 15px; }
    .box { rx: 14; ry: 14; stroke-width: 3; }
    .ui { fill: #e0f2fe; stroke: #0284c7; }
    .backend { fill: #dcfce7; stroke: #16a34a; }
    .data { fill: #fef3c7; stroke: #d97706; }
    .decision { fill: #fef9c3; stroke: #ca8a04; }
    .line { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect class="box ui" x="80" y="40" width="180" height="70"/>
  <text x="170" y="70" text-anchor="middle">Selected date</text>
  <rect class="box ui" x="80" y="150" width="220" height="76"/>
  <text x="190" y="182" text-anchor="middle">get_records_for_date(date)</text>
  <rect class="box ui" x="80" y="268" width="260" height="94"/>
  <text x="210" y="302" text-anchor="middle">RecordPanel state</text>
  <text class="small" x="210" y="328" text-anchor="middle">current record, day list,</text>
  <text class="small" x="210" y="350" text-anchor="middle">debounced draft values</text>
  <rect class="box ui" x="80" y="402" width="290" height="94"/>
  <text x="225" y="436" text-anchor="middle">Edit symptoms, medications,</text>
  <text class="small" x="225" y="462" text-anchor="middle">vitals, sleep, wellbeing, notes</text>
  <rect class="box decision" x="440" y="410" width="160" height="76"/>
  <text x="520" y="440" text-anchor="middle">Record id</text>
  <text class="small" x="520" y="462" text-anchor="middle">already exists?</text>
  <rect class="box backend" x="670" y="300" width="180" height="70"/>
  <text x="760" y="330" text-anchor="middle">create_record(date)</text>
  <rect class="box backend" x="670" y="410" width="180" height="70"/>
  <text x="760" y="440" text-anchor="middle">save_record(id, payload)</text>
  <rect class="box backend" x="670" y="520" width="200" height="80"/>
  <text x="770" y="552" text-anchor="middle">encrypt payload JSON</text>
  <text class="small" x="770" y="576" text-anchor="middle">with unlocked master key</text>
  <rect class="box data" x="420" y="530" width="180" height="80"/>
  <text x="510" y="562" text-anchor="middle">records table</text>
  <text class="small" x="510" y="586" text-anchor="middle">date plaintext</text>
  <rect class="box ui" x="80" y="540" width="240" height="80"/>
  <text x="200" y="572" text-anchor="middle">get_all_record_dates()</text>
  <text class="small" x="200" y="596" text-anchor="middle">refresh calendar indicators</text>
  <path class="line" d="M 170 110 L 190 150"/>
  <path class="line" d="M 190 226 L 210 268"/>
  <path class="line" d="M 210 362 L 225 402"/>
  <path class="line" d="M 370 449 L 440 449"/>
  <path class="line" d="M 600 449 L 670 445"/>
  <path class="line" d="M 520 410 L 760 370"/>
  <path class="line" d="M 760 480 L 770 520"/>
  <path class="line" d="M 670 560 L 600 570"/>
  <path class="line" d="M 420 570 L 320 580"/>
</svg>
