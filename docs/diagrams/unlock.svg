<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Bayand unlock flow</title>
  <desc id="desc">Password-only unlock flow: password entry, auth row lookup, Argon2 derivation, master key unwrap, database open, backup rotation, and unlocked session.</desc>
  <rect width="1200" height="420" fill="#ffffff"/>
  <style>
    text { font-family: "IBM Plex Sans", sans-serif; fill: #111827; font-size: 18px; }
    .small { font-size: 15px; }
    .lane { stroke: #cbd5e1; stroke-width: 2; }
    .step { fill: #e0f2fe; stroke: #0284c7; stroke-width: 3; rx: 14; ry: 14; }
    .data { fill: #fef3c7; stroke: #d97706; stroke-width: 3; rx: 14; ry: 14; }
    .arrow { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    .note { fill: #f8fafc; stroke: #94a3b8; stroke-width: 2; rx: 12; ry: 12; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <text x="90" y="48">User</text>
  <text x="280" y="48">Bayand UI</text>
  <text x="505" y="48">Rust backend</text>
  <text x="760" y="48">auth row</text>
  <text x="930" y="48">bayand.db</text>
  <text x="1080" y="48">backups</text>
  <line class="lane" x1="90" y1="60" x2="90" y2="370"/>
  <line class="lane" x1="280" y1="60" x2="280" y2="370"/>
  <line class="lane" x1="505" y1="60" x2="505" y2="370"/>
  <line class="lane" x1="760" y1="60" x2="760" y2="370"/>
  <line class="lane" x1="930" y1="60" x2="930" y2="370"/>
  <line class="lane" x1="1080" y1="60" x2="1080" y2="370"/>
  <path class="arrow" d="M 100 95 L 270 95"/>
  <text class="small" x="185" y="84" text-anchor="middle">enter password</text>
  <path class="arrow" d="M 290 145 L 495 145"/>
  <text class="small" x="392" y="134" text-anchor="middle">unlock_tracker(password)</text>
  <path class="arrow" d="M 515 195 L 750 195"/>
  <text class="small" x="632" y="184" text-anchor="middle">load salt and wrapped key</text>
  <path class="arrow" d="M 770 225 L 515 225"/>
  <text class="small" x="642" y="248" text-anchor="middle">stored auth metadata</text>
  <rect class="step" x="430" y="260" width="150" height="62"/>
  <text x="505" y="286" text-anchor="middle">Argon2 derive</text>
  <text class="small" x="505" y="307" text-anchor="middle">unwrap master key</text>
  <path class="arrow" d="M 580 291 L 920 291"/>
  <text class="small" x="750" y="280" text-anchor="middle">open encrypted tracker</text>
  <path class="arrow" d="M 580 331 L 1070 331"/>
  <text class="small" x="825" y="320" text-anchor="middle">backup_and_rotate()</text>
  <rect class="note" x="345" y="350" width="430" height="44"/>
  <text class="small" x="560" y="378" text-anchor="middle">lock_tracker clears in-memory secrets and returns the app to locked state</text>
</svg>
